app = "00024576"
primary_region = "fra"  # or your closest region (e.g. fra for Frankfurt, near Slovakia)

[build]
  dockerfile = "Dockerfile"   # <-- this is the key line!

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true    # stops when idle to save free-tier resources
  auto_start_machines = true
  min_machines_running = 0     # change to 1 if you need always-on

[env]
  NODE_ENV = "production"
  # Add other non-sensitive defaults here
